# KorIA Platform — Docker Compose (Produção)
# Conecta nas redes existentes do stack da VPS (proxy + internal)
# Aproveita o PostgreSQL, Redis e Nginx Proxy Manager já instalados.
#
# Deploy: docker compose -f docker/docker-compose.yml --env-file .env up -d --build

services:
  # ── API (NestJS) ──────────────────────────────────────
  koria-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: koria_api
    restart: unless-stopped
    networks:
      - proxy
      - internal
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - API_PREFIX=/api/v1
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DB_KORIA:-core_sdr}
      - REDIS_URL=redis://redis:6379/4
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CLICKUP_CLIENT_ID=${CLICKUP_CLIENT_ID}
      - CLICKUP_CLIENT_SECRET=${CLICKUP_CLIENT_SECRET}
      - CLICKUP_REDIRECT_URI=${CLICKUP_REDIRECT_URI}
      - CLICKUP_ACCESS_TOKEN=${CLICKUP_ACCESS_TOKEN}
      - CLICKUP_REFRESH_TOKEN=${CLICKUP_REFRESH_TOKEN}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID:-a9081890-d60f-4d91-ab05-c1407302a4c9}
      - UPLOAD_PORTAL_URL=${UPLOAD_PORTAL_URL:-https://upload.koriastudio.com}
      - DASHBOARD_URL=${DASHBOARD_URL:-https://dashboard.koriastudio.com}
      - BRIEFING_FORM_URL=${BRIEFING_FORM_URL:-https://briefing.koriastudio.com}
      - TZ=${TZ:-America/Sao_Paulo}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Upload Portal (React) ─────────────────────────────
  koria-upload-portal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: upload-portal
        VITE_API_URL: ${VITE_API_URL:-https://api.koriastudio.com/api/v1}
    container_name: koria_upload_portal
    restart: unless-stopped
    networks:
      - proxy
    # Nginx Proxy Manager aponta upload.koriastudio.com → koria_upload_portal:80

  # ── Dashboard (React) ─────────────────────────────────
  koria-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: dashboard
        VITE_API_URL: ${VITE_API_URL:-https://api.koriastudio.com/api/v1}
    container_name: koria_dashboard
    restart: unless-stopped
    networks:
      - proxy
    # Nginx Proxy Manager aponta dashboard.koriastudio.com → koria_dashboard:80

  # ── Briefing Form (React) ─────────────────────────────
  koria-briefing-form:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: briefing-form
        VITE_API_URL: ${VITE_API_URL:-https://api.koriastudio.com/api/v1}
    container_name: koria_briefing_form
    restart: unless-stopped
    networks:
      - proxy
    # Nginx Proxy Manager aponta briefing.koriastudio.com → koria_briefing_form:80

# ── Redes existentes do stack da VPS ────────────────────
# Usa external: true para conectar nas redes que já existem
# (criadas pelo docker-compose do seu stack principal)
networks:
  proxy:
    external: true
    name: ${PROJECT_NAME}_proxy
  internal:
    external: true
    name: ${PROJECT_NAME}_internal
